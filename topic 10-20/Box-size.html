<!doctype html>
<html>
  <head>
    <style>
      /* ===== Example 1: Without box-sizing ===== */
      .box-default {
        width: 300px;
        height: 100px;
        border: 1px solid blue;
        margin-bottom: 10px;
      }

      .box-default-padding {
        width: 300px;
        height: 100px;
        padding: 50px;
        border: 1px solid red;
        margin-bottom: 30px;
      }

      /* ===== Example 2: With box-sizing ===== */
      .box-border {
        width: 300px;
        height: 100px;
        border: 1px solid blue;
        box-sizing: border-box;
        margin-bottom: 10px;
      }

      .box-border-padding {
        width: 300px;
        height: 100px;
        padding: 50px;
        border: 1px solid red;
        box-sizing: border-box;
        margin-bottom: 30px;
      }
    </style>
  </head>
  <body>
    <!-- Section 1: Without box-sizing -->
    <h1>Without box-sizing</h1>
    <div class="box-default">
      This div is smaller (width is 300px and height is 100px).
    </div>
    <div class="box-default-padding">
      This div is bigger (width is also 300px and height is 100px because of
      padding).
    </div>

    <!-- Section 2: With box-sizing -->
    <h1>With box-sizing</h1>
    <div class="box-border">Both divs are the same size now!</div>
    <div class="box-border-padding">
      Hooray! Padding is included in width and height.
    </div>
  </body>
</html>
