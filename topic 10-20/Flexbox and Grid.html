<!doctype html>
<html>
  <head>
    <style>
      .container {
        display: grid;
        grid-template-columns: repeat(
          3,
          100px
        ); /* 3 columns, each 100px wide */
        grid-gap: 10px; /* space between items */
        background-color: lightgray;
        padding: 10px;
      }

      .box {
        width: 100px;
        height: 100px;
        background-color: blue;
        color: white;
        display: flex;
        justify-content: center; /* Center text horizontally */
        align-items: center; /* Center text vertically */
        font-size: 24px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box">1</div>
      <div class="box">2</div>
      <div class="box">3</div>
      <div class="box">4</div>
      <div class="box">5</div>
      <div class="box">6</div>
    </div>
  </body>
</html>
