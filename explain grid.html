<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Grid Full Example</title>

    <style>
      .container {
        display: grid; 

        grid-template-columns: 1fr 1fr 1fr;

        grid-template-rows: 100px 150px 100px;

        gap: 10px;

        background: #f4f4f4;
        padding: 10px;
      }

      .item {
        background: #3498db;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 20px;
      }

      .item1 {
        grid-column: 1 / 4;
        background: #2ecc71;
      }

      .item2 {
        grid-row: 2 / 4;
        background: #e74c3c;
      }

      .item5 {
        grid-column: 2 / 4;
        background: #9b59b6;
      }

      .container {
        justify-content: center;
        align-content: center; 
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="item item1">Header (Span 3 columns)</div>
      <div class="item item2">Sidebar (Span 2 rows)</div>
      <div class="item">Content 1</div>
      <div class="item">Content 2</div>
      <div class="item item5">Footer (Span 2 columns)</div>
    </div>
  </body>
</html>
